<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记阅读 - 未动姐姐</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .reader-page {
            min-height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .reader-hero {
            width: 100%;
            height: 34vh;
            min-height: 220px;
            max-height: 360px;
            object-fit: cover;
        }

        .reader-wrap {
            width: min(980px, 94vw);
            margin: 0 auto;
            padding: 1.25rem 0 3rem;
        }

        .reader-category {
            display: inline-block;
            padding: 0.3rem 0.9rem;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            font-size: 0.85rem;
        }

        .reader-title {
            margin: 0.9rem 0;
            font-size: clamp(1.5rem, 2.5vw, 2.2rem);
            line-height: 1.35;
        }

        .reader-desc {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .reader-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.2rem;
            white-space: pre-wrap;
            line-height: 1.95;
            font-size: 1.03rem;
        }

        .reader-meta {
            margin-top: 1rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 0.8rem;
        }

        .reader-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .reader-btn {
            display: inline-block;
            text-decoration: none;
            border-radius: 999px;
            padding: 0.65rem 1rem;
            border: 1px solid var(--border);
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .reader-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
    </style>
</head>
<body class="reader-page">
    <img id="readerImage" class="reader-hero" alt="笔记封面">
    <main class="reader-wrap">
        <span class="reader-category" id="readerCategory"></span>
        <h1 class="reader-title" id="readerTitle"></h1>
        <p class="reader-desc" id="readerDesc"></p>
        <article class="reader-content" id="readerContent"></article>
        <div class="reader-meta" id="readerMeta"></div>
        <div class="reader-actions">
            <a id="readerXhs" class="reader-btn primary" target="_self" rel="noopener noreferrer" href="https://www.xiaohongshu.com/user/profile/58ec2e436a6a694daa309b21">查看原文</a>
            <a class="reader-btn" href="notes.html">回到笔记页</a>
        </div>
    </main>

    <button type="button" class="back-page-btn" id="backPageBtn">返回</button>

    <script>
        (function() {
            const key = window.location.hash.replace('#', '');
            const raw = key ? sessionStorage.getItem(key) : null;
            if (!raw) {
                window.location.href = 'notes.html';
                return;
            }

            const data = JSON.parse(raw);
            const image = document.getElementById('readerImage');
            const category = document.getElementById('readerCategory');
            const title = document.getElementById('readerTitle');
            const desc = document.getElementById('readerDesc');
            const content = document.getElementById('readerContent');
            const meta = document.getElementById('readerMeta');
            const xhs = document.getElementById('readerXhs');

            image.src = data.image || 'images/note2.webp';
            image.alt = data.imageAlt || '笔记封面';
            category.textContent = data.category || '笔记';
            title.textContent = data.title || '';
            desc.textContent = data.desc || '';
            content.textContent = data.content || data.desc || '';
            meta.innerHTML = data.statsHtml || '';
            xhs.href = data.xhsUrl || 'https://www.xiaohongshu.com/user/profile/58ec2e436a6a694daa309b21';

            const backBtn = document.getElementById('backPageBtn');
            backBtn.addEventListener('click', function() {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    window.location.href = 'notes.html';
                }
            });
        })();
    </script>
</body>
</html>
